<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffc0cb, #ff69b4);
    overflow: hidden;
    text-align: center;
    color: white;
}

.container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

#question {
    font-size: 2.2em;
    margin-bottom: 20px;
    text-shadow: 0 0 6px #fff, 0 0 12px #ff69b4;
}

.btn {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.25s ease;
    font-size: 15px;
}

.yes {
    background: #ff1493;
    color: white;
}

/* LETTER */
.letter {
    width: 90%;
    max-width: 600px;
    max-height: 70vh;
    overflow-y: auto;
    background: rgba(255,255,255,0.18);
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    position: relative;
    z-index: 10;
    margin: 30px auto;
    text-align: left;
    line-height: 1.7;
    font-size: 16px;
}

.letter h1 {
    text-align: center;
    margin-bottom: 15px;
}

@media (max-width: 768px) {
    .letter {
        width: 95%;
        max-height: 75vh;
        padding: 20px;
    }
}

.hintBox {
    margin-top: 20px;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.2);
    display: none;
}

/* HEART */
.img-heart {
    position: absolute;
    z-index: 1;
    background: url('https://raw.githubusercontent.com/Mavthunder/letter/main/yrfinal.png') center/contain no-repeat;
    animation: floatUpFade linear forwards;
}

.confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    animation: fall linear forwards;
}

@keyframes floatUpFade {
    0% { transform: translateY(110vh); opacity: 0; }
    10% { opacity: 1; }
    70% { opacity: 1; }
    100% { transform: translateY(-120vh); opacity: 0; }
}

@keyframes fall {
    to { transform: translateY(100vh) rotate(360deg); }
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="container" id="quiz">
    <h1 id="question"></h1>
    <div>
        <button class="btn yes" onclick="answer(true)">Yes 💕</button>
        <button class="btn" id="noBtn">No 🙄</button>
    </div>
</div>

<div class="container hidden" id="letterContainer">
    <div class="letter">
        <h1>💌 My Fatso Beto</h1>

        <p>
So bete first of all jisse phale ma apni payar bhari baatein start karu usse phale happiest birthday meri payari beto 🥳🥳🥳... (your full message here)
        </p>

        <button id="giftBtn" class="btn yes hidden">🎁 Here are hints to chotu motu gifts</button>
        <div id="hintBox1" class="hintBox"></div>

        <button id="nextGiftBtn" class="btn yes hidden">👀 Here’s another one</button>
        <div id="hintBox2" class="hintBox"></div>
    </div>
</div>

<script>
let step = 0;
let giftClicks = 0;
let nextClicks = 0;

const questions = [
    "Are you ready for something adorable? 😏",
    "Do you promise not to judge me? 👀",
    "Are you secretly obsessed with me? 😌",
    "Will you keep reading no matter what? 💕"
];

window.onload = () => {
    document.getElementById("question").innerText = questions[0];
};

/* 😈 NO BUTTON (INFINITE DODGE) */
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("click", moveNo);

function moveNo() {
    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    const x = Math.random() * maxX * 0.6;
    const y = Math.random() * maxY * 0.4;

    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

/* YES FLOW */
function answer(isYes) {
    if (!isYes) return;

    step++;

    if (step < questions.length) {
        document.getElementById("question").innerText = questions[step];
    } else {
        showLetter();
        createConfetti();
    }
}

function showLetter() {
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("letterContainer").classList.remove("hidden");

    createHearts();

    const letter = document.querySelector(".letter");
    const giftBtn = document.getElementById("giftBtn");

    letter.addEventListener("scroll", () => {
        if (letter.scrollTop + letter.clientHeight >= letter.scrollHeight - 5) {
            giftBtn.classList.remove("hidden");
        }
    });
}

/* HEARTS */
function createHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "img-heart";

        let size = Math.random() < 0.8 ? 80 : 140;
        heart.style.width = size + "px";
        heart.style.height = size + "px";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 6) + "s";

        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 10000);
    }, 400);
}

/* CONFETTI */
function createConfetti() {
    for (let i = 0; i < 100; i++) {
        let conf = document.createElement("div");
        conf.className = "confetti";
        conf.style.left = Math.random() * 100 + "vw";
        conf.style.background = `hsl(${Math.random()*360},100%,75%)`;
        conf.style.animationDuration = (Math.random() * 3 + 2) + "s";

        document.body.appendChild(conf);
        setTimeout(() => conf.remove(), 5000);
    }
}

/* GIFT BUTTONS */
document.getElementById("giftBtn").onclick = function() {
    giftClicks++;
    if (giftClicks < 3) {
        this.style.transform = `translate(${(Math.random()-0.5)*80}px, ${(Math.random()-0.5)*50}px)`;
    } else {
        showHint1();
    }
};

document.getElementById("nextGiftBtn").onclick = function() {
    nextClicks++;
    if (nextClicks < 3) {
        this.style.transform = `translate(${(Math.random()-0.5)*80}px, ${(Math.random()-0.5)*50}px)`;
    } else {
        showHint2();
    }
};

function showHint1() {
    document.getElementById("hintBox1").style.display = "block";
    document.getElementById("nextGiftBtn").classList.remove("hidden");
}

function showHint2() {
    document.getElementById("hintBox2").style.display = "block";
}
</script>

</body>
</html>
